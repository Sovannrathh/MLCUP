environment:
  base:
    apps:
    - class: webapp
      health_check_command: '[ \$(echo url=\$(jupyter lab list | head -n 2 | tail
        -n 1 | cut -f1 -d'' '' | grep -v ''Currently'' | sed "s@/?@/lab?@g") | curl
        -o /dev/null -s -w ''%{http_code}'' --config -) == ''200'' ]'
      icon_url: ''
      logfile_path: ''
      name: jupyterlab
      start_command: jupyter lab --allow-root --port 8888 --ip 0.0.0.0 --no-browser
        --NotebookApp.base_url=\$PROXY_PREFIX --NotebookApp.default_url=/lab --NotebookApp.allow_origin='*'
      stop_command: jupyter lab stop 8888
      timeout_seconds: 60
      type: jupyterlab
      user_msg: ''
      webapp_options:
        autolaunch: true
        port: '8888'
        proxy:
          trim_prefix: false
        url_command: jupyter lab list | head -n 2 | tail -n 1 | cut -f1 -d' ' | grep
          -v 'Currently'
    build_timestamp: '20260112183658'
    cuda_version: ''
    description: A Python Base with Jupyterlab
    entrypoint_script: ''
    icon_url: https://workbench.download.nvidia.com/static/img/ai-workbench-icon-rectangle.jpg
    image: nvidia/ai-workbench/python-basic:1.0.9
    image_version: 1.0.9
    labels:
    - ubuntu
    - python3
    - jupyterlab
    name: Python Basic
    os: linux
    os_distro: ubuntu
    os_distro_release: '22.04'
    package_manager_environment:
      name: ''
      target: ''
    package_managers:
    - binary_path: /usr/bin/apt
      installed_packages:
      - curl
      - git
      - git-lfs
      - python3
      - gcc
      - python3-dev
      - python3-pip
      - vim
      name: apt
    - binary_path: /usr/bin/pip
      installed_packages:
      - jupyterlab==4.3.6
      name: pip
    programming_languages:
    - python3
    registry: nvcr.io
    schema_version: v2
    supported_architectures: []
    user_info:
      gid: ''
      uid: ''
      username: ''
  compose_file_path: ''
execution:
  apps:
  - class: native
    health_check_command: '[ \$(ps aux | grep ".vscode-server" | grep -v grep | wc
      -l ) -gt 4 ] && [ \$(ps aux | grep "/.vscode-server/bin/.*/node .* net.createConnection"
      | grep -v grep | wc -l) -gt 0 ]'
    icon_url: ''
    logfile_path: ''
    name: VS Code
    start_command: ''
    stop_command: ''
    timeout_seconds: 120
    type: vs-code
    user_msg: ''
  mounts:
  - description: Project directory
    options: rw
    target: /project/
    type: project
  resources:
    gpu:
      requested: 0
    sharedMemoryMB: 0
  secrets: []
layout: []
meta:
  createdOn: '2026-06-08T08:43:39Z'
  defaultBranch: main
  description: ''
  image: project-nvidia-nemoclaw
  labels: []
  name: NVIDIA-NemoClaw
specMinorVersion: 2
specVersion: v2
